  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #111; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    
    .dropdown-animate {
      animation: dropdown-in 0.2s ease-out;
      transform-origin: top;
    }
    @keyframes dropdown-in {
      from { opacity: 0; transform: scaleY(0.95); }
      to { opacity: 1; transform: scaleY(1); }
    }

    .loading-spin {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>

      </div>

    const MAIN_TABS_LIST = ['전체 보기', ...Object.keys(CATEGORIES)];
    const KEYWORDS = ['모음집', '이마키스', '질투', '친지마'];

    let MOCK_ARCHIVE_DATA = [];
    let IMPORTED_TEMP_DATA = []; 

    const state = {
      lang: 'ko',
      isLoading: true,
      sortOrder: 'desc',
      activeMainTab: 'archive', 
      activeSubTab: '전체 보기',
      activeCategory: '전체',
      selectedDate: todayStr,
      activeKeyword: '전체',
      viewYear: now.getFullYear(),
      viewMonth: now.getMonth() + 1,
      searchTerm: '',
      displayLimit: 30,
      isAdminMode: false,
      adminTab: 'list', 
      isEditModalOpen: false,
      isYearDropdownOpen: false,
      isMonthDropdownOpen: false,
      isKeywordDropdownOpen: false,
      isPasswordModalOpen: false,
      passwordError: false,
      isExtracting: false, 
      adminEditingId: null,
      adminTempMainType: '무대영상',
      importTempId: '',
      importStartDate: todayStr,
      importEndDate: todayStr
    };

    const getT = (key) => {
      const langMap = TRANSLATIONS[state.lang].categories;
      return langMap[key] || key;
    };

    // --- Actions ---
    window.setLanguage = (code) => { state.lang = code; render(); };
    window.setMainTab = (tabId) => { state.activeMainTab = tabId; state.displayLimit = 30; render(); };
    window.setAdminTab = (tabId) => { state.adminTab = tabId; state.displayLimit = 30; render(); };
    window.setSubTab = (tab) => { state.activeSubTab = tab; state.activeCategory = '전체'; state.displayLimit = 30; render(); };
    window.setCategory = (cat) => { state.activeCategory = cat; state.displayLimit = 30; render(); };
    window.setSelectedDate = (date) => { state.selectedDate = date; render(); };
    window.setKeyword = (kw) => { state.activeKeyword = kw; state.displayLimit = 30; render(); };
    window.handleSearch = (e) => { state.searchTerm = e.target.value; state.displayLimit = 30; render(); };
    window.toggleSort = () => { state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc'; render(); };
    window.loadMore = () => { state.displayLimit += 30; render(); };

    window.toggleYearDropdown = (e) => { e.stopPropagation(); state.isYearDropdownOpen = !state.isYearDropdownOpen; state.isMonthDropdownOpen = false; render(); };
    window.toggleMonthDropdown = (e) => { e.stopPropagation(); state.isMonthDropdownOpen = !state.isMonthDropdownOpen; state.isYearDropdownOpen = false; render(); };
    window.changeViewYear = (year) => { state.viewYear = parseInt(year); state.isYearDropdownOpen = false; render(); };
    window.changeViewMonth = (month) => { state.viewMonth = parseInt(month); state.isMonthDropdownOpen = false; render(); };
    window.prevMonth = () => { if (state.viewMonth === 1) { state.viewMonth = 12; state.viewYear--; } else { state.viewMonth--; } render(); };
    window.nextMonth = () => { if (state.viewMonth === 12) { state.viewMonth = 1; state.viewYear++; } else { state.viewMonth++; } render(); };

    window.toggleAdminMode = () => { 
      if (!state.isAdminMode) {
        state.isPasswordModalOpen = true;
        state.passwordError = false;
      } else {
        state.isAdminMode = false;
        state.searchTerm = '';
        state.displayLimit = 30;
      }
      render(); 
    };

    window.closePasswordModal = () => {
      state.isPasswordModalOpen = false;
      state.passwordError = false;
      render();
    };

    window.submitPassword = (e) => {
      e.preventDefault();
      const input = document.getElementById('admin-password-input').value;
      if (input === '1028hqab') {
        state.isAdminMode = true;
        state.isPasswordModalOpen = false;
        state.passwordError = false;
        render();
      } else {
        state.passwordError = true;
        render();
      }
    };
    
    window.openAdminModal = (id = null) => {
      if (id !== null) {
        state.adminEditingId = Number(id);
        const item = MOCK_ARCHIVE_DATA.find(d => d.id === state.adminEditingId);
        if (item) state.adminTempMainType = item.mainType;
      } else {
        state.adminEditingId = null;
        state.adminTempMainType = '무대영상'; 
      }
      state.isEditModalOpen = true;
      render();
    };

    window.closeAdminModal = () => { state.isEditModalOpen = false; render(); };
    window.adminMainTypeChange = (val) => {
      state.adminTempMainType = val;
      const typeSelect = document.getElementById('form-type');
      if (typeSelect) {
        const subCats = CATEGORIES[val] || [];
        typeSelect.innerHTML = subCats.map(k => `<option value="${k}">${getT(k)}</option>`).join('');
      }
    };
    
    window.deleteData = (id) => { if(confirm("정말 삭제하시겠습니까?")) { MOCK_ARCHIVE_DATA = MOCK_ARCHIVE_DATA.filter(d => d.id !== Number(id)); render(); } };
    window.saveData = (e) => {
      e.preventDefault();
      const mainType = document.getElementById('form-mainType').value.trim();
      const type = document.getElementById('form-type').value.trim();
      const date = document.getElementById('form-date').value.trim();
      const title = document.getElementById('form-title').value.trim();
      const link = document.getElementById('form-link').value.trim();
      const img = document.getElementById('form-img').value.trim();
      const rawKeywords = document.getElementById('form-keywords').value.trim();
      if(state.adminEditingId !== null) {
        const idx = MOCK_ARCHIVE_DATA.findIndex(d => d.id === state.adminEditingId);
        if(idx > -1) MOCK_ARCHIVE_DATA[idx] = { ...MOCK_ARCHIVE_DATA[idx], mainType, type, date, title, img, link, searchData: `${title} ${rawKeywords}`.toLowerCase(), rawKeywords };
      } else {
        MOCK_ARCHIVE_DATA.unshift({ id: Date.now(), mainType, type, date, title, img, link, searchData: `${title} ${rawKeywords}`.toLowerCase(), rawKeywords });
      }
      state.isEditModalOpen = false; render();
    };

    window.updateImportFields = () => {
      const idInput = document.getElementById('import-id');
      const startInput = document.getElementById('import-start-date');
      const endInput = document.getElementById('import-end-date');
      if(idInput) state.importTempId = idInput.value;
      if(startInput) state.importStartDate = startInput.value;
      if(endInput) state.importEndDate = endInput.value;
    };

    window.handleImportFetch = () => {
      const id = state.importTempId;
      const start = state.importStartDate;
      const end = state.importEndDate;
      if(!id) return alert("아이디를 입력해주세요.");
      IMPORTED_TEMP_DATA = [
        { id: Date.now(), mainType: 'SNS', type: '공식 트위터', date: start, title: `${id} 계정 데이터`, img: '', link: '', rawKeywords: '' }
      ];
      render();
    };

    window.handleImportPost = () => {
      if(IMPORTED_TEMP_DATA.length === 0) return alert("게시할 데이터가 없습니다.");
      if(confirm("게시하시겠습니까?")) {
        MOCK_ARCHIVE_DATA = [...IMPORTED_TEMP_DATA, ...MOCK_ARCHIVE_DATA];
        IMPORTED_TEMP_DATA = [];
        state.adminTab = 'list';
        render();
      }
    };

    window.extractThumbnail = async () => {
      const link = document.getElementById('form-link').value.trim();
      if(!link) return alert("랜딩 링크를 먼저 입력해주세요.");
      state.isExtracting = true;
      const btn = document.getElementById('btn-extract');
      if(btn) btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 loading-spin"></i>';
      lucide.createIcons();
      try {
        const response = await fetch(`https://api.microlink.io?url=${encodeURIComponent(link)}`);
        const data = await response.json();
        if (data.status === 'success' && data.data.image && data.data.image.url) {
          document.getElementById('form-img').value = data.data.image.url;
        } else { alert("이미지를 찾을 수 없습니다."); }
      } catch (err) { alert("추출 중 오류 발생"); } finally {
        state.isExtracting = false;
        const T = TRANSLATIONS[state.lang];
        if(btn) btn.innerHTML = `<i data-lucide="image-plus" class="w-4 h-4"></i> ${T.extract}`;
        lucide.createIcons();
      }
    };

    document.addEventListener('click', () => {
      if (state.isYearDropdownOpen || state.isMonthDropdownOpen) {
        state.isYearDropdownOpen = false; 
        state.isMonthDropdownOpen = false; 
        render();
      }
    });

    async function loadSheetData() {
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/);
        if(!jsonMatch) throw new Error("Format error");
        const data = JSON.parse(jsonMatch[1]);
        const rows = data.table.rows;
        MOCK_ARCHIVE_DATA = rows.map((row, index) => {
          if (!row.c) return null;
          const title = (row.c[0]?.v || '').toString().trim();
          let rawDate = (row.c[1]?.f || row.c[1]?.v || '').toString().trim();
          let dateStr = rawDate.replace(/[\.\s\/]/g, '-').replace(/-+/g, '-');
          if (dateStr.includes('-')) {
            const parts = dateStr.split('-');
            if (parts.length === 3) dateStr = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
          }
          const mainType = (row.c[8]?.v || '기타').toString().trim(); 
          const type = (row.c[10]?.v || '기타').toString().trim();   
          const img = (row.c[11]?.v || '').toString().trim();       
          const rawKeywords = (row.c[13]?.v || '').toString().trim(); 
          const searchData = `${title} ${row.c[3]?.v || ''} ${rawKeywords} ${mainType} ${type} ${dateStr}`.toLowerCase();
          return { id: index + 1, mainType, type, date: dateStr, title, img, link: (row.c[2]?.v || ''), searchData, rawKeywords };
        }).filter(item => item && item.title); 
        state.isLoading = false;
        render();
      } catch (error) {
        state.isLoading = false;
        render();
      }
    }

    function createAdminCardHTML(item) {
      const T = TRANSLATIONS[state.lang];
      return `
        <div class="bg-[#1a1a1a] p-3.5 rounded-2xl border border-neutral-800 flex gap-4 hover:border-neutral-700 transition-colors">
          <div class="w-16 h-16 shrink-0 rounded-xl overflow-hidden bg-neutral-800"><img src="${item.img || 'https://via.placeholder.com/80'}" class="w-full h-full object-cover"></div>
          <div class="flex-1 min-w-0 flex flex-col justify-between py-0.5">
            <div>
              <div class="text-[10px] font-medium text-red-400 truncate mb-0.5">${getT(item.mainType)} > ${getT(item.type)} | ${item.date || '---'}</div>
              <div class="text-xs font-bold text-white line-clamp-1">${item.title}</div>
            </div>
            <div class="flex gap-2 mt-2">
              <button onclick="openAdminModal(${item.id})" class="text-[10px] font-bold bg-neutral-800 text-gray-300 px-3 py-1.5 rounded-lg active:scale-95 transition-all">${T.edit}</button>
              <button onclick="deleteData(${item.id})" class="text-[10px] font-bold bg-red-900/20 text-red-400 px-3 py-1.5 rounded-lg active:scale-95 transition-all">${T.delete}</button>
            </div>
          </div>
        </div>
      `;
    }

    function createCardHTML(item) {
      const imgUrl = item.img || 'https://via.placeholder.com/600x337/1a1a1a/ffffff?text=No+Image';
      const WrapperTag = item.link ? 'a' : 'div';
      const hrefAttr = item.link ? `href="${item.link}" target="_blank"` : '';
      return `
        <${WrapperTag} ${hrefAttr} class="flex flex-col gap-2 group cursor-pointer block">
          <div class="relative aspect-video rounded-xl overflow-hidden bg-neutral-800 border border-neutral-800 group-hover:border-neutral-600 transition-colors">
            <img src="${imgUrl}" alt="Thumb" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />
          </div>

            <div class="flex justify-between items-center text-[10px]">
              <span class="border border-red-500/50 text-red-500 bg-red-500/10 px-1.5 py-0.5 rounded font-medium text-[9px] uppercase">${getT(item.type)}</span>

      `;
    }

    function getSearchFilteredData(dataArray) {
      if(!state.searchTerm) return dataArray;
      const lowerSearch = state.searchTerm.toLowerCase();
      return dataArray.filter(item => item.title.toLowerCase().includes(lowerSearch) || item.searchData.includes(lowerSearch));
    }

    function getSortedData(dataArray) {
      return [...dataArray].sort((a, b) => {
        const dateA = a.date || "";
        const dateB = b.date || "";
        const dateComp = state.sortOrder === 'desc' ? dateB.localeCompare(dateA) : a.date.localeCompare(dateB);
        return dateComp || (state.sortOrder === 'desc' ? b.id - a.id : a.id - b.id);
      });
    }

    function getCalendarHeaderHTML() {
      const T = TRANSLATIONS[state.lang];
      const years = Array.from({length: 10}, (_, i) => 2017 + i);
      const months = Array.from({length: 12}, (_, i) => i + 1);
      return `
        <div class="flex items-center justify-between mb-6 px-1 relative">
          <button onclick="prevMonth()" class="p-2 hover:bg-neutral-800 rounded-full transition-colors"><i data-lucide="chevron-left"></i></button>

              ${state.isYearDropdownOpen ? `<div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 w-28 bg-[#1a1a1a] border border-neutral-700 rounded-xl shadow-2xl z-50 overflow-hidden dropdown-animate"><div class="max-h-48 overflow-y-auto custom-scrollbar">${years.map(y => `<div onclick="changeViewYear(${y})" class="px-4 py-2.5 text-sm text-center border-b border-neutral-800 last:border-none hover:bg-neutral-800 cursor-pointer transition-colors ${state.viewYear === y ? 'text-red-500 font-bold bg-neutral-800/50' : 'text-gray-300'}">${y}${T.year}</div>`).join('')}</div></div>` : ''}
            </div>
            <div class="relative">
              <button onclick="toggleMonthDropdown(event)" class="flex items-center gap-1 px-3 py-1.5 bg-[#1a1a1a] border border-neutral-800 rounded-xl hover:border-neutral-600 transition-all font-bold text-lg text-white">${state.viewMonth}${T.month} <i data-lucide="chevron-down" class="w-4 h-4 text-gray-500"></i></button>
              ${state.isMonthDropdownOpen ? `<div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 w-24 bg-[#1a1a1a] border border-neutral-700 rounded-xl shadow-2xl z-50 overflow-hidden dropdown-animate"><div class="max-h-48 overflow-y-auto custom-scrollbar">${months.map(m => `<div onclick="changeViewMonth(${m})" class="px-4 py-2.5 text-sm text-center border-b border-neutral-800 last:border-none hover:bg-neutral-800 cursor-pointer transition-colors ${state.viewMonth === m ? 'text-red-500 font-bold bg-neutral-800/50' : 'text-gray-300'}">${m}${T.month}</div>`).join('')}</div></div>` : ''}
            </div>
          </div>
          <button onclick="nextMonth()" class="p-2 hover:bg-neutral-800 rounded-full transition-colors"><i data-lucide="chevron-right"></i></button>
        </div>
      `;

    function render() {

      const mainTabsContainer = document.getElementById('main-tabs');

      if (state.isLoading) {

        lucide.createIcons();
        return;
      }

      let contentHTML = '';

      if (state.isPasswordModalOpen) {
        contentHTML = `
          <div class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
            <form onsubmit="submitPassword(event)" class="bg-[#1a1a1a] w-full max-w-[320px] rounded-2xl p-6 border border-neutral-700 flex flex-col gap-4 animate-in zoom-in-95 duration-200 shadow-2xl">

              <div class="flex flex-col gap-1">
                <input type="password" id="admin-password-input" placeholder="${T.passwordPlaceholder}" class="bg-[#111] border ${state.passwordError ? 'border-red-600' : 'border-neutral-700'} rounded-xl p-3 text-center text-sm text-white focus:outline-none focus:border-red-600 transition-colors" autofocus>
                ${state.passwordError ? `<p class="text-[10px] text-red-500 text-center mt-1 font-bold">${T.passwordError}</p>` : ''}
              </div>
              <button type="submit" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold text-sm transition-colors text-white">${T.passwordBtn}</button>
            </form>
          </div>
        `;
      } else if (state.isAdminMode) {
        const adminTabs = [{ id: 'list', icon: 'database', label: T.listAdmin }, { id: 'calendar', icon: 'calendar', label: T.calAdmin }, { id: 'import', icon: 'download-cloud', label: T.importAdmin }];

        document.getElementById('search-container').style.display = state.adminTab === 'list' ? 'block' : 'none';

        if (state.adminTab === 'list') {
          let filteredData = getSortedData(getSearchFilteredData(MOCK_ARCHIVE_DATA));
          const visibleData = filteredData.slice(0, state.displayLimit);
          contentHTML = `
            <div class="animate-in fade-in duration-300">

          const daysInMonth = new Date(state.viewYear, state.viewMonth, 0).getDate();
          const firstDay = new Date(state.viewYear, state.viewMonth - 1, 1).getDay();
          const monthKey = `${state.viewYear}-${String(state.viewMonth).padStart(2, '0')}`;
          const currentMonthData = MOCK_ARCHIVE_DATA.filter(item => item.date && item.date.startsWith(monthKey));
          const activeDays = currentMonthData.map(item => parseInt(item.date.split('-')[2]));
          let calGrid = '';
          for(let i=0; i<firstDay; i++) calGrid += `<div></div>`;
          for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${state.viewYear}-${String(state.viewMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isSelected = state.selectedDate === dateStr;
            const isToday = todayStr === dateStr;
            calGrid += `<div onclick="setSelectedDate('${dateStr}')" class="flex flex-col items-center justify-center h-12 cursor-pointer group"><div class="w-8 h-8 flex items-center justify-center rounded-full text-sm font-bold ${isSelected ? 'bg-red-600 text-white' : isToday ? 'text-red-500 bg-neutral-800' : 'text-gray-300 group-hover:bg-neutral-800'}">${d}</div>${activeDays.includes(d) ? `<div class="w-1 h-1 bg-red-500 rounded-full mt-0.5"></div>` : ''}</div>`;
          }
          let dailyData = getSortedData(MOCK_ARCHIVE_DATA.filter(item => item.date === state.selectedDate));
          contentHTML = `
            <div class="animate-in fade-in duration-300">
              ${getCalendarHeaderHTML()}
              <div class="grid grid-cols-7 text-[10px] text-gray-500 font-bold mb-2 text-center"><div>${T.daySun}</div><div>${T.dayMon}</div><div>${T.dayTue}</div><div>${T.dayWed}</div><div>${T.dayThu}</div><div>${T.dayFri}</div><div>${T.daySat}</div></div>
              <div class="grid grid-cols-7 gap-y-1 mb-8">${calGrid}</div>
              <div class="border-t border-neutral-800 pt-6">
                <div class="flex items-center justify-between mb-4 border-l-4 border-red-600 pl-3"><h3 class="font-bold text-gray-200">${state.selectedDate} ${T.calAdmin}</h3><button onclick="openAdminModal()" class="text-[10px] font-bold text-red-500">${T.add}</button></div>
                <div class="flex flex-col gap-3">${dailyData.length > 0 ? dailyData.map(item => createAdminCardHTML(item)).join('') : `<div class="text-center text-gray-500 text-sm py-10">${T.empty}</div>`}</div>
              </div>
            </div>
          `;
        } else if (state.adminTab === 'import') {
          contentHTML = `
            <div class="animate-in fade-in duration-300">
              <div class="mb-6 px-1">
                <h2 class="text-xl font-bold text-white flex items-center gap-2 mb-4"><i data-lucide="download-cloud" class="w-5 h-5 text-red-500"></i> ${T.importTitle}</h2>
                <div class="bg-[#1a1a1a] border border-neutral-800 rounded-2xl p-4 flex flex-col gap-4">
                  <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.importId}</label><input type="text" id="import-id" value="${state.importTempId}" oninput="updateImportFields()" onclick="event.stopPropagation()" placeholder="ID" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-600 transition-colors"></div>
                  <div class="grid grid-cols-2 gap-3">
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.importStart}</label><input type="date" id="import-start-date" value="${state.importStartDate}" oninput="updateImportFields()" onclick="event.stopPropagation()" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-600 transition-colors"></div>
                    <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.importEnd}</label><input type="date" id="import-end-date" value="${state.importEndDate}" oninput="updateImportFields()" onclick="event.stopPropagation()" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none focus:border-red-600 transition-colors"></div>
                  </div>
                  <button onclick="handleImportFetch()" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold text-sm transition-colors">${T.importBtn}</button>
                </div>
              </div>
            </div>
          `;
        }
        if (state.isEditModalOpen) {
          const isEdit = state.adminEditingId !== null;
          const targetItem = isEdit ? MOCK_ARCHIVE_DATA.find(d => d.id === state.adminEditingId) : null;
          const item = targetItem || { mainType: state.adminTempMainType, type: '', date: state.selectedDate || todayStr, title: '', img: '', link: '', rawKeywords: '' };
          let displayDate = item.date;
          if (displayDate && !displayDate.includes('-') && displayDate.length === 8) displayDate = `${displayDate.slice(0,4)}-${displayDate.slice(4,6)}-${displayDate.slice(6,8)}`;
          contentHTML += `
            <div class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm" onclick="event.stopPropagation()">
              <form onsubmit="saveData(event)" class="bg-[#1a1a1a] w-full max-sm rounded-2xl p-6 border border-neutral-700 flex flex-col gap-4 animate-in zoom-in-95 duration-200 shadow-2xl overflow-y-auto max-h-[90vh] custom-scrollbar">
                <h3 class="font-bold text-lg text-white">${isEdit ? T.edit : T.add}</h3>
                <div class="grid grid-cols-2 gap-3">
                  <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.mainCat}</label><select id="form-mainType" onchange="adminMainTypeChange(this.value)" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none">${Object.keys(CATEGORIES).map(k => `<option value="${k}" ${k === state.adminTempMainType ? 'selected' : ''}>${getT(k)}</option>`).join('')}</select></div>
                  <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.subCat}</label><select id="form-type" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none">${(CATEGORIES[state.adminTempMainType] || []).map(k => `<option value="${k}" ${item.type === k ? 'selected' : ''}>${getT(k)}</option>`).join('')}</select></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.date}</label><input type="date" id="form-date" value="${displayDate}" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"></div>
                  <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.keywordCat}</label><select id="form-keywords" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"><option value="">${T.all}</option>${KEYWORDS.map(kw => `<option value="${kw}" ${item.rawKeywords === kw ? 'selected' : ''}>${getT(kw)}</option>`).join('')}</select></div>
                </div>
                <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.title}</label><input type="text" id="form-title" placeholder="${T.title}" value="${item.title.replace(/"/g, '&quot;')}" required class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"></div>
                <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.landingLink}</label><input type="url" id="form-link" value="${item.link}" class="bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"></div>
                <div class="flex flex-col gap-1"><label class="text-[10px] text-gray-500 font-bold ml-1">${T.thumbUrl}</label><div class="flex gap-2"><input type="url" id="form-img" value="${item.img}" class="flex-1 bg-[#111] border border-neutral-700 rounded-xl p-3 text-xs text-white focus:outline-none"><button type="button" id="btn-extract" onclick="extractThumbnail()" class="shrink-0 bg-neutral-800 hover:bg-neutral-700 px-4 py-2 rounded-xl text-xs font-bold text-gray-300 transition-colors flex items-center gap-1"><i data-lucide="image-plus" class="w-4 h-4"></i> ${T.extract}</button></div></div>
                <div class="flex justify-end gap-2 mt-4"><button type="button" onclick="closeAdminModal()" class="px-5 py-2.5 text-xs bg-neutral-800 hover:bg-neutral-700 rounded-xl font-bold text-gray-300 transition-colors">${T.cancel}</button><button type="submit" class="px-5 py-2.5 text-xs bg-red-600 hover:bg-red-500 rounded-xl font-bold text-white shadow-lg shadow-red-900/40 transition-colors">${T.save}</button></div>
              </form>
            </div>
          `;
        }
      } else {
        const tabs = [{ id: 'archive', icon: 'folder', label: T.archive }, { id: 'keyword', icon: 'heart', label: T.keyword }, { id: 'calendar', icon: 'calendar', label: T.calendar }];
        mainTabsContainer.innerHTML = tabs.map(tab => `<button onclick="setMainTab('${tab.id}')" class="flex-1 flex justify-center items-center gap-1.5 py-3 text-sm font-bold border-b-2 transition-colors ${state.activeMainTab === tab.id ? 'border-red-600 text-white' : 'border-transparent text-gray-500'}"><i data-lucide="${tab.icon}" class="w-4 h-4"></i>${tab.label}</button>`).join('');
        document.getElementById('search-container').style.display = 'block';

        if (state.activeMainTab === 'keyword') {
          let keywordData = MOCK_ARCHIVE_DATA.filter(item => { if (state.activeKeyword === '전체') return item.rawKeywords && item.rawKeywords.trim() !== ''; return item.searchData.includes(state.activeKeyword.toLowerCase()); });
          keywordData = getSortedData(getSearchFilteredData(keywordData));
          const visibleData = keywordData.slice(0, state.displayLimit);
          contentHTML = `
            <div class="flex gap-2 overflow-x-auto scrollbar-hide mb-4 pb-1">
              ${['전체', ...KEYWORDS].map(kw => `<button onclick="setKeyword('${kw}')" class="whitespace-nowrap px-3 py-1 rounded-full text-[11px] border ${state.activeKeyword === kw ? 'bg-red-600 border-red-600 text-white font-bold' : 'border-neutral-600 text-gray-400 font-medium'} transition-all">${kw === '전체' ? T.all : getT(kw)}</button>`).join('')}
            </div>
            <div class="flex justify-between items-center mb-4 text-xs text-gray-400"><span>${T.total} ${keywordData.length}${T.unit}</span><button onclick="toggleSort()" class="flex items-center gap-1"><i data-lucide="arrow-up-down" class="w-3 h-3"></i>${state.sortOrder === 'desc' ? T.latest : T.oldest}</button></div>
            <div class="grid grid-cols-2 gap-3">${visibleData.map(item => createCardHTML(item)).join('')}</div>
            ${keywordData.length > state.displayLimit ? `<button onclick="loadMore()" class="w-full mt-8 py-3 bg-[#1a1a1a] border border-neutral-800 rounded-xl text-xs font-bold text-gray-400 hover:text-white transition-colors">${T.more}</button>` : ''}
          `;
        } else if (state.activeMainTab === 'archive') {
          let archiveData = MOCK_ARCHIVE_DATA.filter(item => (state.activeSubTab === '전체 보기' || item.mainType === state.activeSubTab) && (state.activeCategory === '전체' || item.type === state.activeCategory));
          archiveData = getSortedData(getSearchFilteredData(archiveData));
          const visibleData = archiveData.slice(0, state.displayLimit);
          contentHTML = `
            <div class="flex gap-2 overflow-x-auto scrollbar-hide mb-4 pb-1">${MAIN_TABS_LIST.map(tab => `<button onclick="setSubTab('${tab}')" class="whitespace-nowrap px-3 py-1 rounded-full text-xs border ${state.activeSubTab === tab ? 'bg-neutral-800 border-neutral-600 text-white' : 'border-transparent text-gray-500'}">${getT(tab)}</button>`).join('')}</div>
            ${state.activeSubTab !== '전체 보기' ? `<div class="bg-[#1a1a1a] rounded-2xl p-3 mb-6 border border-neutral-800"><div class="flex flex-wrap gap-1.5"><button onclick="setCategory('전체')" class="px-2.5 py-1 rounded-full text-[11px] border ${state.activeCategory === '전체' ? 'bg-red-600 border-red-600 text-white' : 'border-neutral-600 text-gray-400'}">${T.all}</button>${(CATEGORIES[state.activeSubTab] || []).map(cat => `<button onclick="setCategory('${cat}')" class="px-2.5 py-1 rounded-full text-[11px] border ${state.activeCategory === cat ? 'bg-red-600 border-red-600 text-white' : 'border-neutral-600 text-gray-400'}">${getT(cat)}</button>`).join('')}</div></div>` : ''}
            <div class="flex justify-between items-center mb-4 text-xs text-gray-400"><span>${T.total} ${archiveData.length}${T.unit}</span><button onclick="toggleSort()" class="flex items-center gap-1"><i data-lucide="arrow-up-down" class="w-3 h-3"></i>${state.sortOrder === 'desc' ? T.latest : T.oldest}</button></div>
            <div class="grid grid-cols-2 gap-3">${visibleData.map(item => createCardHTML(item)).join('')}</div>
            ${archiveData.length > state.displayLimit ? `<button onclick="loadMore()" class="w-full mt-8 py-3 bg-[#1a1a1a] border border-neutral-800 rounded-xl text-xs font-bold text-gray-400 hover:text-white transition-colors">${T.more}</button>` : ''}
          `;
        } else if (state.activeMainTab === 'calendar') {
          const daysInMonth = new Date(state.viewYear, state.viewMonth, 0).getDate();
          const firstDay = new Date(state.viewYear, state.viewMonth - 1, 1).getDay();
          const monthKey = `${state.viewYear}-${String(state.viewMonth).padStart(2, '0')}`;
          const currentMonthData = MOCK_ARCHIVE_DATA.filter(item => item.date && item.date.startsWith(monthKey));
          const monthlyTotal = currentMonthData.length;
          const activeDays = currentMonthData.map(item => parseInt(item.date.split('-')[2]));
          let calGrid = '';
          for(let i=0; i<firstDay; i++) calGrid += `<div></div>`;
          for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${state.viewYear}-${String(state.viewMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isSelected = state.selectedDate === dateStr;
            const isToday = todayStr === dateStr;
            calGrid += `<div onclick="setSelectedDate('${dateStr}')" class="flex flex-col items-center justify-center h-12 cursor-pointer group"><div class="w-8 h-8 flex items-center justify-center rounded-full text-sm font-bold ${isSelected ? 'bg-red-600 text-white' : isToday ? 'text-red-500 bg-neutral-800' : 'text-gray-300 group-hover:bg-neutral-800'}">${d}</div>${activeDays.includes(d) ? `<div class="w-1 h-1 bg-red-500 rounded-full mt-0.5"></div>` : ''}</div>`;
          }
          let dailyData = getSortedData(getSearchFilteredData(currentMonthData));
          contentHTML = `
            <div class="animate-in fade-in duration-300">
              ${getCalendarHeaderHTML()}
              <div class="grid grid-cols-7 text-[10px] text-gray-500 font-bold mb-2 text-center"><div>${T.daySun}</div><div>${T.dayMon}</div><div>${T.dayTue}</div><div>${T.dayWed}</div><div>${T.dayThu}</div><div>${T.dayFri}</div><div>${T.daySat}</div></div>
              <div class="grid grid-cols-7 gap-y-1 mb-8">${calGrid}</div>
              <div class="border-t border-neutral-800 pt-6">
                <div class="flex items-center gap-2 mb-4 border-l-4 border-red-600 pl-3">
                  <h3 class="font-bold text-gray-200">${state.viewMonth}${T.month} ${T.total} (${monthlyTotal}${T.unit})</h3>
                </div>
                <div class="grid grid-cols-2 gap-3">${dailyData.length > 0 ? dailyData.map(item => createCardHTML(item)).join('') : `<div class="col-span-2 text-center text-gray-500 text-sm py-10">${T.empty}</div>`}</div>
              </div>
            </div>
          `;
        }
      }
      contentArea.innerHTML = contentHTML;
      lucide.createIcons();
    }

    loadSheetData();
  </script>
</body>
</html>
