    // --- 1. Google Sheets 설정 ---

    const i18n = {

        archive: {

            '개인 라이브': 'Solo Live', '단체 라이브': 'Group Live', '승구리당당숭당당': 'Seungguri Dangdang', '승협이': 'Seunghyub', '우얘합': "Let's Talk", '하루의마무리': 'End of the Day',
            '레코딩로그': 'Recording Log', '만년썰전': 'Mannyeon Sseoljeon', '메이킹': 'Making', '뮤비': 'MV', '버킷리스트': 'Bucket List', '비하인드': 'Behind', '쇼츠': 'Shorts', '스페셜클립': 'Special Clip', '승캠': 'Seung Cam', '엔킷리스트': 'N-Kit List', '엔피아 모집': 'N.Fia Recruitment', '커버': 'Cover', '합주일지': 'Practice Log',
            '개인 인스타그램': 'Personal IG', '공식 SNS': 'Official SNS', '공식 블로그': 'Official Blog', '공식카페': 'Fancafe', '커플릴스': 'Couple Reels',
            '버블': 'Bubble', '프롬': 'FROMM', '라디오': 'Radio', '방송': 'Broadcast', '유튜브 컨텐츠': 'YT Contents', '인터뷰': 'Interview', '기타': 'Etc', '백업': 'Backup'
          
        ,
        calendar: { archiveTitleSuffix: " Archive", countPrefix: "(", countSuffix: " items)", yearSuffix: "", monthSuffix: "" },
        admin: { title: "Data Admin Mode", addBtn: "+ Add Data", edit: "Edit", delete: "Delete", save: "Save", cancel: "Cancel", addTitle: "Add New Data", editTitle: "Edit Data", mainType: "Main Cat.", subType: "Sub Cat.", date: "Date", contentTitle: "Title", imgUrl: "Thumbnail URL", confirmDel: "Are you sure you want to delete?" }
      }
    };

    const state = {
      isLoading: true, 
      language: 'ko', 
      sortOrder: 'desc', // desc: 최신순, asc: 과거순
      activeMainTab: 'keyword',
      activeSubTab: '무대영상',
      activeCategory: '전체',
      selectedDate: null,
      activeKeyword: '전체',
      viewYear: 2026,
      viewMonth: 1,
      searchTerm: '', // 검색어
      isYearDropdownOpen: false, isMonthDropdownOpen: false, isLangDropdownOpen: false,
      isAdminMode: false, isEditModalOpen: false, adminEditingId: null, adminTempMainType: '무대영상'
    };

    window.setMainTab = (tabId) => { state.activeMainTab = tabId; render(); };
    window.setSubTab = (tab) => { state.activeSubTab = tab; state.activeCategory = '전체'; render(); };
    window.setCategory = (cat) => { state.activeCategory = cat; render(); };
    window.setSelectedDate = (date) => { state.selectedDate = date; render(); };
    window.setKeyword = (kw) => { state.activeKeyword = kw; render(); };
    window.setLanguage = (lang) => { state.language = lang; state.isLangDropdownOpen = false; render(); };
    window.handleSearch = (e) => { state.searchTerm = e.target.value; render(); };
    window.toggleSort = () => { state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc'; render(); };

    window.toggleLangDropdown = (e) => { if(e) e.stopPropagation(); state.isLangDropdownOpen = !state.isLangDropdownOpen; state.isYearDropdownOpen = false; state.isMonthDropdownOpen = false; render(); };
    window.toggleYearDropdown = (e) => { if(e) e.stopPropagation(); state.isYearDropdownOpen = !state.isYearDropdownOpen; state.isMonthDropdownOpen = false; state.isLangDropdownOpen = false; render(); };
    window.toggleMonthDropdown = (e) => { if(e) e.stopPropagation(); state.isMonthDropdownOpen = !state.isMonthDropdownOpen; state.isYearDropdownOpen = false; state.isLangDropdownOpen = false; render(); };
    
    window.changeViewYear = (year) => { state.viewYear = parseInt(year); state.isYearDropdownOpen = false; render(); };
    window.changeViewMonth = (month) => { state.viewMonth = parseInt(month); state.isMonthDropdownOpen = false; render(); };
    window.prevMonth = () => { if (state.viewMonth === 1) { if (state.viewYear > 2017) { state.viewMonth = 12; state.viewYear--; } } else { state.viewMonth--; } render(); };
    window.nextMonth = () => { if (state.viewMonth === 12) { state.viewMonth = 1; state.viewYear++; } else { state.viewMonth++; } render(); };

    window.toggleAdminMode = () => { state.isAdminMode = !state.isAdminMode; render(); };
    window.openAdminModal = (id = null) => {
      state.adminEditingId = id; state.isEditModalOpen = true;
      if(id) { const item = MOCK_ARCHIVE_DATA.find(d => d.id === id); if(item) state.adminTempMainType = item.mainType; } 
      else { state.adminTempMainType = '무대영상'; }
      render();
    };
    window.closeAdminModal = () => { state.isEditModalOpen = false; render(); };
    window.adminMainTypeChange = (val) => { state.adminTempMainType = val; render(); };
    
    window.deleteData = (id) => {
      const t = i18n[state.language].admin;
      if(confirm(t.confirmDel)) { MOCK_ARCHIVE_DATA = MOCK_ARCHIVE_DATA.filter(d => d.id !== id); render(); }
    };
    window.saveData = (e) => {
      e.preventDefault();
      const mainType = document.getElementById('form-mainType').value;
      const type = document.getElementById('form-type').value;
      const date = document.getElementById('form-date').value;
      const title = document.getElementById('form-title').value;
      const img = document.getElementById('form-img').value;

      if(state.adminEditingId) {
        const idx = MOCK_ARCHIVE_DATA.findIndex(d => d.id === state.adminEditingId);
        if(idx > -1) MOCK_ARCHIVE_DATA[idx] = { ...MOCK_ARCHIVE_DATA[idx], mainType, type, date, title, img };
      } else {
        MOCK_ARCHIVE_DATA.unshift({ id: new Date().getTime(), mainType, type, date, title, img, link: '' });
      }
      state.isEditModalOpen = false; render();
      alert("✅ 수정된 내용은 임시 반영되었습니다.");
    };

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.custom-dropdown-container')) {
        if (state.isYearDropdownOpen || state.isMonthDropdownOpen || state.isLangDropdownOpen) {
          state.isYearDropdownOpen = false; state.isMonthDropdownOpen = false; state.isLangDropdownOpen = false; render();
        }
      }
    });

    // --- 시트 데이터 로드 함수 (이미지 기준 A, B, C, I, L 열 파싱) ---
    async function loadSheetData() {
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/);
        if(!jsonMatch) throw new Error("데이터 포맷 오류");
        
        const data = JSON.parse(jsonMatch[1]);
        const rows = data.table.rows;

        MOCK_ARCHIVE_DATA = rows.map((row, index) => {
          // A열(0): 제목, B열(1): 날짜, C열(2): 링크, D열(3): 검색키워드, K열(10): 키워드
          // I열(8): 카테고리 (소분류), L열(11): 썸네일
          const title = row.c[0]?.v || '';
          
          let dateStr = row.c[1]?.f || row.c[1]?.v || '';
          if (dateStr && dateStr.includes('/')) dateStr = dateStr.replace(/\//g, '-');
          
          const link = row.c[2]?.v || '';
          
          // I열 (카테고리) 처리 - 만약 "인터뷰, 질투" 처럼 콤마가 있다면 첫 번째 값을 소분류로 사용
          let rawCategory = row.c[8]?.v || '';
          let type = rawCategory.split(',')[0].trim() || '기타';
          
          // 대분류 자동 매칭
          let mainType = TYPE_TO_MAIN_MAP[type] || '기타';

          const img = row.c[11]?.v || '';
          
          // D열(검색용) + K열(키워드) 합쳐서 검색 효율성 확보
          const searchData = (row.c[3]?.v || '') + ' ' + (row.c[10]?.v || '');

          return { id: index + 1, mainType, type, date: dateStr, title, img, link, searchData };
        }).filter(item => item.title && item.date); // 제목과 날짜가 정상적으로 있는 행만 살림

        state.isLoading = false;
        if (MOCK_ARCHIVE_DATA.length > 0) {
          const firstDateStr = MOCK_ARCHIVE_DATA[0].date;
          state.selectedDate = firstDateStr;
          state.viewYear = parseInt(firstDateStr.split('-')[0]) || new Date().getFullYear();
          state.viewMonth = parseInt(firstDateStr.split('-')[1]) || new Date().getMonth() + 1;
        }
        render();
      } catch (error) {
        console.error("데이터 로드 실패", error);
        state.isLoading = false;
        document.getElementById('content-area').innerHTML = `<div class="text-center text-red-500 mt-20">⚠️ 구글 시트 데이터를 불러올 수 없습니다.<br>시트 공유 설정이 '링크가 있는 모든 사용자'로 되어있는지 확인해주세요.</div>`;
      }
    }

    // --- 렌더링 함수 ---
    function createCardHTML(item, t) {
      const displayType = t.archive?.subCategories?.[item.type] || item.type;
      const imgUrl = item.img || 'https://via.placeholder.com/600x337/1a1a1a/ffffff?text=No+Image';
      
      // 링크가 있으면 a 태그 사용, 없으면 div
      const WrapperTag = item.link ? 'a' : 'div';
      const hrefAttr = item.link ? `href="${item.link}" target="_blank" rel="noopener noreferrer"` : '';

      return `
        <${WrapperTag} ${hrefAttr} class="flex flex-col gap-2 group cursor-pointer block">
          <div class="relative aspect-video rounded-xl overflow-hidden bg-neutral-800 border border-neutral-800 group-hover:border-neutral-600 transition-colors">
            <img src="${imgUrl}" alt="${item.title.replace(/"/g, '&quot;')}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
            ${item.link ? `<div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors flex items-center justify-center"><i data-lucide="external-link" class="w-6 h-6 text-white opacity-0 group-hover:opacity-100 transition-opacity"></i></div>` : ''}
          </div>
          <div class="flex flex-col gap-1 px-0.5">
            <div class="flex justify-between items-center text-[10px]">
              <span class="border border-red-500/50 text-red-500 bg-red-500/10 px-1.5 py-0.5 rounded font-medium">${displayType}</span>
              <span class="text-gray-500 font-medium tracking-tight">${item.date}</span>
            </div>
            <h3 class="text-xs font-medium text-gray-200 line-clamp-2 leading-snug mt-1 group-hover:text-white transition-colors">${item.title}</h3>
          </div>
        </${WrapperTag}>
      `;
    }

    function updateHeader(t) {
      const searchInput = document.getElementById('search-input');
      const searchContainer = document.getElementById('search-container');
      const searchHint = document.getElementById('search-hint');
      const adminBtn = document.getElementById('admin-toggle-btn');
      const langBtn = document.getElementById('lang-btn-container');
      
      if(searchInput) searchInput.placeholder = t.searchPlaceholder;
      if(searchHint) searchHint.innerText = t.searchHint;
      if(state.isAdminMode) {
        searchContainer.classList.add('hidden');
        if(langBtn) langBtn.classList.add('hidden'); 
        adminBtn.innerHTML = `<i data-lucide="unlock" class="w-[18px] h-[18px] text-red-500 hover:text-red-400"></i>`;
      } else {
        searchContainer.classList.remove('hidden');
        if(langBtn) langBtn.classList.remove('hidden'); 
        adminBtn.innerHTML = `<i data-lucide="lock" class="w-[18px] h-[18px] text-gray-400 hover:text-white"></i>`;
      }

      const langDropdown = document.getElementById('lang-dropdown');
      if (state.isLangDropdownOpen) { langDropdown.classList.remove('hidden'); langDropdown.classList.add('flex'); } 
      else { langDropdown.classList.add('hidden'); langDropdown.classList.remove('flex'); }

      const koBtn = document.getElementById('lang-ko'); const enBtn = document.getElementById('lang-en');
      const activeClass = ['text-red-500', 'font-bold', 'bg-neutral-800/80']; const inactiveClass = ['text-gray-300'];

      if(state.language === 'ko') {
        koBtn.classList.add(...activeClass); koBtn.classList.remove(...inactiveClass);
        enBtn.classList.remove(...activeClass); enBtn.classList.add(...inactiveClass);
      } else {
        enBtn.classList.add(...activeClass); enBtn.classList.remove(...inactiveClass);
        koBtn.classList.remove(...activeClass); koBtn.classList.add(...inactiveClass);
      }
    }

    // 데이터를 검색어로 필터링하는 헬퍼 함수
    function getSearchFilteredData(dataArray) {
      if(!state.searchTerm) return dataArray;
      const lowerSearch = state.searchTerm.toLowerCase();
      return dataArray.filter(item => 
        item.title.toLowerCase().includes(lowerSearch) || 
        item.searchData.toLowerCase().includes(lowerSearch)
      );
    }

    // 날짜를 기준으로 정렬하는 헬퍼 함수 (최신순 / 과거순)
    function getSortedData(dataArray) {
      return dataArray.sort((a, b) => {
        if (state.sortOrder === 'desc') {
          return b.date.localeCompare(a.date) || b.id - a.id;
        } else {
          return a.date.localeCompare(b.date) || a.id - b.id;
        }
      });
    }

    function render() {
      const t = i18n[state.language]; 
      updateHeader(t);

      const mainTabsContainer = document.getElementById('main-tabs');
      const contentArea = document.getElementById('content-area');
      
      if (state.isLoading) {
        mainTabsContainer.innerHTML = '';
        contentArea.innerHTML = `<div class="flex flex-col items-center justify-center mt-32"><i data-lucide="loader-2" class="w-8 h-8 text-red-500 animate-spin mb-4"></i><p class="text-gray-500 text-sm">스프레드시트에서 데이터를 불러오는 중입니다...</p></div>`;
        lucide.createIcons();
        return;
      }

      let contentHTML = '';

      if (state.isAdminMode) {
        mainTabsContainer.innerHTML = ''; mainTabsContainer.classList.add('hidden');
        const adminT = i18n.ko.admin; const archiveT = i18n.ko.archive;

        contentHTML = `
          <div class="animate-in fade-in duration-300">
            <div class="flex justify-between items-center mb-6 px-1"><h2 class="text-xl font-bold text-white flex items-center gap-2"><i data-lucide="database" class="w-5 h-5 text-red-500"></i> ${adminT.title}</h2><button onclick="openAdminModal()" class="bg-red-600 hover:bg-red-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-lg">${adminT.addBtn}</button></div>
            <div class="flex flex-col gap-3">
              ${MOCK_ARCHIVE_DATA.map(item => {
                const displayMain = archiveT.categories[item.mainType] || item.mainType; const displayType = archiveT.subCategories[item.type] || item.type;
                const imgUrl = item.img || 'https://via.placeholder.com/100x100/1a1a1a/ffffff?text=No+Img';
                return `
                <div class="bg-[#1a1a1a] p-3.5 rounded-2xl border border-neutral-800/80 flex gap-4 hover:border-neutral-600 transition-colors">
                  <div class="w-20 h-20 shrink-0 rounded-xl overflow-hidden bg-neutral-800"><img src="${imgUrl}" class="w-full h-full object-cover"></div>
                  <div class="flex-1 flex flex-col justify-center min-w-0">
                    <div class="text-[10px] font-medium text-red-400 mb-1 truncate">${displayMain} > ${displayType} <span class="text-gray-600 mx-1">|</span> <span class="text-gray-400">${item.date}</span></div>
                    <div class="text-sm font-medium text-white line-clamp-2 leading-snug mb-2">${item.title}</div>
                    <div class="flex gap-2 mt-auto">
                      <button onclick="openAdminModal(${item.id})" class="text-[11px] font-bold bg-neutral-800 hover:bg-neutral-700 text-gray-300 px-3 py-1.5 rounded-md transition-colors">${adminT.edit}</button>
                      <button onclick="deleteData(${item.id})" class="text-[11px] font-bold bg-red-900/30 hover:bg-red-900/60 text-red-400 px-3 py-1.5 rounded-md transition-colors">${adminT.delete}</button>
                    </div>
                  </div>
                </div>
              `}).join('')}
            </div>
          </div>
        `;

        if (state.isEditModalOpen) {
          const isEdit = state.adminEditingId !== null;
          const item = isEdit ? MOCK_ARCHIVE_DATA.find(d => d.id === state.adminEditingId) : { mainType: '무대영상', type: '콘서트', date: new Date().toISOString().split('T')[0], title: '', img: '' };
          const currentMainType = state.adminTempMainType;

          contentHTML += `
            <div class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm"><form onsubmit="saveData(event)" class="bg-[#1a1a1a] w-full max-w-md rounded-2xl p-6 border border-neutral-800 flex flex-col gap-5 animate-in zoom-in-95 duration-200"><h3 class="text-lg font-bold text-white flex items-center gap-2"><i data-lucide="${isEdit ? 'edit' : 'plus-circle'}" class="w-5 h-5 text-red-500"></i> ${isEdit ? adminT.editTitle : adminT.addTitle}</h3><div class="grid grid-cols-2 gap-4"><div class="flex flex-col gap-1.5"><label class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">${adminT.mainType}</label><select id="form-mainType" onchange="adminMainTypeChange(this.value)" class="bg-[#111] border border-neutral-800 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500">${Object.keys(CATEGORIES).map(k => `<option value="${k}" ${k === currentMainType ? 'selected' : ''}>${archiveT.categories[k] || k}</option>`).join('')}</select></div><div class="flex flex-col gap-1.5"><label class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">${adminT.subType}</label><select id="form-type" class="bg-[#111] border border-neutral-800 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500">${(CATEGORIES[currentMainType] || []).map(k => `<option value="${k}" ${isEdit && k === item.type ? 'selected' : ''}>${archiveT.subCategories[k] || k}</option>`).join('')}</select></div></div><div class="flex flex-col gap-1.5"><label class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">${adminT.date}</label><input type="date" id="form-date" value="${item.date}" required class="bg-[#111] border border-neutral-800 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500"></div><div class="flex flex-col gap-1.5"><label class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">${adminT.contentTitle}</label><input type="text" id="form-title" value="${item.title.replace(/"/g, '&quot;')}" required class="bg-[#111] border border-neutral-800 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500"></div><div class="flex flex-col gap-1.5"><label class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">${adminT.imgUrl}</label><input type="url" id="form-img" value="${item.img}" class="bg-[#111] border border-neutral-800 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:border-red-500"></div><div class="flex justify-end gap-2 mt-2"><button type="button" onclick="closeAdminModal()" class="px-5 py-2.5 rounded-xl text-sm font-bold bg-[#111] border border-neutral-800 hover:bg-neutral-800 text-gray-300 transition-colors">${adminT.cancel}</button><button type="submit" class="px-5 py-2.5 rounded-xl text-sm font-bold bg-red-600 hover:bg-red-500 text-white transition-colors shadow-lg shadow-red-600/20">${adminT.save}</button></div></form></div>
          `;
        }
      } else {
        mainTabsContainer.classList.remove('hidden');
        const mainTabsData = [{ id: 'keyword', icon: '💖', label: t.tabs.keyword }, { id: 'archive', icon: '📁', label: t.tabs.archive }, { id: 'calendar', icon: '📅', label: t.tabs.calendar }];
        mainTabsContainer.innerHTML = mainTabsData.map(tab => `<button onclick="setMainTab('${tab.id}')" class="flex items-center gap-1.5 whitespace-nowrap px-4 py-3 text-sm font-bold border-b-2 transition-colors ${state.activeMainTab === tab.id ? 'border-red-600 text-white' : 'border-transparent text-gray-400 hover:text-gray-200'}"><span>${tab.icon}</span>${tab.label}</button>`).join('');

        if (state.activeMainTab === 'keyword') {
          let keywordsHTML = `<div class="bg-[#1a1a1a] rounded-2xl p-3.5 mb-6 border border-neutral-800/50"><div class="flex items-center gap-1.5 mb-2.5 text-gray-400 font-medium text-xs"><i data-lucide="filter" class="w-3 h-3"></i> ${t.keyword.title}</div><div class="flex flex-wrap gap-1.5">`;
          ['전체', ...KEYWORDS].forEach(kw => {
            const isActive = state.activeKeyword === kw; const displayKw = kw === '전체' ? t.keyword.all : (t.keyword.items?.[kw] || kw);
            keywordsHTML += `<button onclick="setKeyword('${kw}')" class="px-2.5 py-1 rounded-full text-[11px] font-medium transition-colors border ${isActive ? 'bg-[#E50914] border-[#E50914] text-white' : 'bg-transparent border-neutral-600 text-gray-300 hover:border-neutral-400'}">${displayKw}</button>`;
          });
          keywordsHTML += `</div></div>`;

          let keywordFilteredData = MOCK_ARCHIVE_DATA.filter(item => {
             if (state.activeKeyword === '전체') return true;
             return item.title.includes(state.activeKeyword) || item.searchData.includes(state.activeKeyword);
          });
          keywordFilteredData = getSortedData(getSearchFilteredData(keywordFilteredData));

          let gridHTML = `<div class="grid grid-cols-2 gap-3">` + keywordFilteredData.map(item => createCardHTML(item, t)).join('') + `</div>`;
          contentHTML = `<div class="animate-in fade-in duration-300">${keywordsHTML}<div class="flex justify-between items-center mb-4"><span class="text-gray-400 text-sm">${t.keyword.totalPrefix}${keywordFilteredData.length}${t.keyword.totalSuffix}</span><button onclick="toggleSort()" class="text-xs font-medium text-gray-400 bg-[#1a1a1a] hover:bg-neutral-800 border border-neutral-800 px-2.5 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors"><i data-lucide="${state.sortOrder === 'desc' ? 'arrow-down' : 'arrow-up'}" class="w-3 h-3"></i>${state.sortOrder === 'desc' ? t.sortLatest : t.sortOldest}</button></div>${gridHTML}</div>`;
        } 
        else if (state.activeMainTab === 'archive') {
          let subTabsHTML = `<div class="flex gap-2 overflow-x-auto scrollbar-hide mb-6 -mx-4 px-4 pb-1">`;
          MAIN_TABS_LIST.forEach(tab => {
            const isActive = state.activeSubTab === tab; const displayTab = t.archive.categories[tab] || tab;
            subTabsHTML += `<button onclick="setSubTab('${tab}')" class="whitespace-nowrap px-3 py-1 rounded-full text-xs font-medium transition-colors border ${isActive ? 'bg-neutral-800 border-neutral-600 text-white' : 'bg-transparent border-transparent text-gray-400 hover:text-gray-300'}">${displayTab}</button>`;
          });
          subTabsHTML += `</div>`;

          let categoryHTML = '';
          if (state.activeSubTab !== '전체 보기' && CATEGORIES[state.activeSubTab] && CATEGORIES[state.activeSubTab].length > 0) {
            categoryHTML += `<div class="bg-[#1a1a1a] rounded-2xl p-3.5 mb-6 border border-neutral-800/50"><div class="flex items-center gap-1.5 mb-2.5 text-gray-400 font-medium text-xs"><i data-lucide="filter" class="w-3 h-3"></i> ${t.archive.subCategoryTitle}</div><div class="flex flex-wrap gap-1.5"><button onclick="setCategory('전체')" class="px-2.5 py-1 rounded-full text-[11px] font-medium transition-colors border ${state.activeCategory === '전체' ? 'bg-[#E50914] border-[#E50914] text-white' : 'bg-transparent border-neutral-600 text-gray-300 hover:border-neutral-400'}">${t.archive.all}</button>`;
            CATEGORIES[state.activeSubTab].forEach(cat => {
              const isActive = state.activeCategory === cat; const displayCat = t.archive.subCategories?.[cat] || cat;
              categoryHTML += `<button onclick="setCategory('${cat}')" class="px-2.5 py-1 rounded-full text-[11px] font-medium transition-colors border ${isActive ? 'bg-[#E50914] border-[#E50914] text-white' : 'bg-transparent border-neutral-600 text-gray-300 hover:border-neutral-400'}">${displayCat}</button>`;
            });
            categoryHTML += `</div></div>`;
          }

          let filteredData = MOCK_ARCHIVE_DATA.filter(item => {
            if (state.activeSubTab === '전체 보기') return true;
            if (item.mainType !== state.activeSubTab) return false;
            if (state.activeCategory === '전체') return true;
            return item.type === state.activeCategory;
          });
          filteredData = getSortedData(getSearchFilteredData(filteredData));

          let gridHTML = `<div class="grid grid-cols-2 gap-3">` + filteredData.map(item => createCardHTML(item, t)).join('') + `</div>`;
          contentHTML = `<div class="animate-in fade-in duration-300">${subTabsHTML}${categoryHTML}<div class="flex justify-between items-center mb-4"><span class="text-gray-400 text-sm">${t.archive.totalPrefix}${filteredData.length}${t.archive.totalSuffix}</span><button onclick="toggleSort()" class="text-xs font-medium text-gray-400 bg-[#1a1a1a] hover:bg-neutral-800 border border-neutral-800 px-2.5 py-1.5 rounded-lg flex items-center gap-1.5 transition-colors"><i data-lucide="${state.sortOrder === 'desc' ? 'arrow-down' : 'arrow-up'}" class="w-3 h-3"></i>${state.sortOrder === 'desc' ? t.sortLatest : t.sortOldest}</button></div>${gridHTML}</div>`;
        } 
        else if (state.activeMainTab === 'calendar') {
          const year = state.viewYear; const month = state.viewMonth;
          const daysInMonth = new Date(year, month, 0).getDate();
          const firstDay = new Date(year, month - 1, 1).getDay();

          let daysHTML = '';
          for(let i=0; i<firstDay; i++) daysHTML += `<div></div>`;

          const activeDays = MOCK_ARCHIVE_DATA
            .filter(item => item.date && item.date.startsWith(`${year}-${String(month).padStart(2, '0')}`))
            .map(item => parseInt(item.date.split('-')[2]));

          for(let day=1; day<=daysInMonth; day++) {
            const dateStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const isSelected = state.selectedDate === dateStr;
            const hasData = activeDays.includes(day);
            const isRed = (firstDay + day - 1) % 7 === 0 && !isSelected;

            daysHTML += `
              <div class="flex flex-col items-center justify-start h-14 cursor-pointer" onclick="setSelectedDate('${dateStr}')">
                <div class="w-8 h-8 flex items-center justify-center rounded-full text-sm font-bold transition-colors ${isSelected ? 'bg-[#E50914] text-white' : 'text-gray-300 hover:bg-neutral-800'} ${isRed ? 'text-red-500' : ''}">${day}</div>
                ${hasData ? `<div class="flex gap-1 mt-1"><span class="w-1.5 h-1.5 rounded-full bg-red-500"></span></div>` : ''}
              </div>
            `;
          }

          let selectedDateData = MOCK_ARCHIVE_DATA.filter(item => item.date === state.selectedDate);
          selectedDateData = getSortedData(getSearchFilteredData(selectedDateData));

          const selectedCardsHTML = selectedDateData.length > 0 
            ? selectedDateData.map(item => createCardHTML(item, t)).join('')
            : `<div class="col-span-2 text-center text-gray-500 py-10 text-sm">해당 날짜의 기록이 없습니다.</div>`;
            
          const currentYear = new Date().getFullYear();
          const yearOptions = Array.from({length: currentYear - 2017 + 3}, (_, i) => 2017 + i); 
          const monthOptions = Array.from({length: 12}, (_, i) => i + 1);

          contentHTML = `
            <div class="animate-in fade-in duration-300">
              <div class="flex items-center justify-between py-2 mb-4 px-1">
                <button onclick="prevMonth()" class="p-2 bg-[#1a1a1a] border border-neutral-800 rounded-full text-gray-400 hover:text-white hover:border-neutral-600 transition-colors shadow-sm"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                <div class="flex items-center gap-2">
                  <div class="relative custom-dropdown-container"><div onclick="toggleYearDropdown(event)" class="flex items-center gap-1.5 bg-[#1a1a1a] border border-neutral-800 hover:border-neutral-600 px-4 py-1.5 rounded-xl cursor-pointer transition-all shadow-sm"><span class="text-lg font-bold text-white tracking-tight">${state.viewYear}${t.calendar.yearSuffix}</span><i data-lucide="${state.isYearDropdownOpen ? 'chevron-up' : 'chevron-down'}" class="w-4 h-4 text-gray-500"></i></div>${state.isYearDropdownOpen ? `<div class="absolute top-full left-0 mt-2 w-full min-w-[80px] max-h-48 overflow-y-auto bg-[#1a1a1a] border border-neutral-700 rounded-xl shadow-xl z-50 py-1 scrollbar-hide animate-in fade-in slide-in-from-top-2 duration-200">${yearOptions.map(y => `<div onclick="changeViewYear(${y})" class="px-3 py-2.5 text-sm text-center cursor-pointer transition-colors ${y === state.viewYear ? 'text-red-500 font-bold bg-neutral-800/80' : 'text-gray-300 hover:bg-neutral-800 hover:text-white'}">${y}${t.calendar.yearSuffix}</div>`).join('')}</div>` : ''}</div>
                  <div class="relative custom-dropdown-container"><div onclick="toggleMonthDropdown(event)" class="flex items-center gap-1.5 bg-[#1a1a1a] border border-neutral-800 hover:border-neutral-600 px-4 py-1.5 rounded-xl cursor-pointer transition-all shadow-sm"><span class="text-lg font-bold text-white tracking-tight">${String(state.viewMonth).padStart(2, '0')}${t.calendar.monthSuffix}</span><i data-lucide="${state.isMonthDropdownOpen ? 'chevron-up' : 'chevron-down'}" class="w-4 h-4 text-gray-500"></i></div>${state.isMonthDropdownOpen ? `<div class="absolute top-full left-0 mt-2 w-full min-w-[70px] max-h-48 overflow-y-auto bg-[#1a1a1a] border border-neutral-700 rounded-xl shadow-xl z-50 py-1 scrollbar-hide animate-in fade-in slide-in-from-top-2 duration-200">${monthOptions.map(m => `<div onclick="changeViewMonth(${m})" class="px-3 py-2.5 text-sm text-center cursor-pointer transition-colors ${m === state.viewMonth ? 'text-red-500 font-bold bg-neutral-800/80' : 'text-gray-300 hover:bg-neutral-800 hover:text-white'}">${m}${t.calendar.monthSuffix}</div>`).join('')}</div>` : ''}</div>
                </div>
                <button onclick="nextMonth()" class="p-2 bg-[#1a1a1a] border border-neutral-800 rounded-full text-gray-400 hover:text-white hover:border-neutral-600 transition-colors shadow-sm"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
              </div>
              <div class="mb-8">
                <div class="grid grid-cols-7 mb-2">${['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'].map((day, i) => `<div class="text-center text-xs font-bold py-2 ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-500'}">${day}</div>`).join('')}</div>
                <div class="grid grid-cols-7 gap-y-4">${daysHTML}</div>
              </div>
              <div class="border-t border-neutral-800 pt-6">
                <div class="flex items-center gap-2 mb-4 border-l-4 border-red-600 pl-3">
                  <h3 class="text-red-500 font-bold text-lg flex items-center gap-2">📅 ${state.selectedDate}${t.calendar.archiveTitleSuffix}</h3>
                  <span class="text-gray-500 text-sm">${t.calendar.countPrefix}${selectedDateData.length}${t.calendar.countSuffix}</span>
                </div>
                <div class="grid grid-cols-2 gap-3">${selectedCardsHTML}</div>
              </div>
            </div>
          `;
        }
      }

      contentArea.innerHTML = contentHTML;
      lucide.createIcons();
    }

    loadSheetData();

  </script>
</body>
</html>
