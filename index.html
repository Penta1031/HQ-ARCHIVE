<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HQ ARCHIVE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #111; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
  </style>
</head>
<body class="min-h-screen bg-[#0f0f0f] text-white font-sans flex justify-center selection:bg-red-500/30">
  
  <div class="w-full max-w-[480px] bg-[#111111] min-h-screen relative shadow-2xl overflow-x-hidden border-x border-neutral-800/50 flex flex-col">
    
    <!-- Header -->
    <header class="px-4 py-4 sticky top-0 bg-[#111111] z-40 border-b border-neutral-800 shrink-0">
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-red-600 font-black text-2xl tracking-tighter cursor-pointer" onclick="location.reload()">HQ ARCHIVE</h1>
        <div class="flex items-center gap-3">
          
          <div class="flex items-center gap-1 cursor-pointer group">
            <div class="w-8 h-8 rounded-full bg-neutral-700 overflow-hidden border border-neutral-600 group-hover:border-neutral-400 transition-colors">
              <img src="https://pbs.twimg.com/media/HB6pDDka8AA0v-3?format=jpg&name=large" alt="Profile" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/150'"/>
            </div>
            <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400 group-hover:text-white transition-colors"></i>
          </div>
          
          <div id="admin-toggle-btn" onclick="toggleAdminMode()" class="cursor-pointer transition-colors"></div>
        </div>
      </div>

      <div id="search-container" class="relative mb-2 transition-all">
        <div class="relative">
          <i data-lucide="search" class="w-[18px] h-[18px] absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
          <input 
            id="search-input"
            type="text" 
            placeholder="검색어를 입력하세요" 
            oninput="handleSearch(event)"
            class="w-full bg-[#1e1e1e] border border-neutral-800 text-white pl-10 pr-4 py-2.5 rounded-full text-sm focus:outline-none focus:border-neutral-600 transition-colors"
          />
        </div>
        <div id="search-hint" class="text-[11px] text-gray-500 mt-2 px-2">💡 추천 검색: 2023-05-22, ㅇㅇㅎ, 하크잖</div>
      </div>
    </header>

    <nav id="main-tabs" class="flex px-4 overflow-x-auto scrollbar-hide border-b border-neutral-800 bg-[#111111] shrink-0"></nav>
    <main id="content-area" class="p-4 pb-20 flex-1 overflow-y-auto custom-scrollbar relative"></main>

  </div>

  <script>
    const SHEET_ID = '1U0KnY-M4xdpmNqbPudPqndy1c8_Y3ROq-x163_Uueb8';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    const now = new Date();
    const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

    const CATEGORIES = {
      '연말결산': ['연말결산'],
      '무대영상': ['공항', '대학축제', '목격담', '버스킹', '쇼케이스', '음악방송', '직캠', '콘서트', '킹덤', '퇴근길', '팬미팅', '팬싸', '페스티벌', '해외투어'],
      '라이브': ['개인 라이브', '단체 라이브', '승구리당당숭당당', '승협이', '우리 얘기 좀 합시다', '하루의 마무리', '라이브'],
      '유튜브': ['레코딩로그', '만년썰전', '메이킹', '뮤비', '버킷리스트', '비하인드', '쇼츠', '스페셜클립', '승캠', '엔킷리스트', '엔피아 모집', '커버', '하얀 크리스마스잖아요', '합주일지'],
      'SNS': ['개인 인스타그램', '공식 인스타그램', '공식 트위터', '공식 블로그', '공식 카페', '릴스'],
      '메시지': ['버블', '프롬'],
      '미디어': ['라디오', '방송', '유튜브 컨텐츠', '인터뷰'],
      '기타': ['기타'],
      '백업': ['백업']
    };

    const MAIN_TABS_LIST = ['전체 보기', ...Object.keys(CATEGORIES)];
    const KEYWORDS = ['모음집', '이마키스', '질투', '친지마'];

    let MOCK_ARCHIVE_DATA = [];

    const textLabels = {
      searchPlaceholder: "검색어를 입력하세요",
      loadMore: "더보기 (+)",
      sortLatest: "최신순",
      sortOldest: "과거순",
      tabs: { archive: "아카이브", keyword: "키워드", calendar: "캘린더" },
      keyword: { title: "카테고리", all: "전체", totalPrefix: "전체 ", totalSuffix: "개" },
      archive: { 
        subCategoryTitle: "상세 카테고리", all: "전체", totalPrefix: "전체 ", totalSuffix: "개"
      },
      calendar: { archiveTitleSuffix: "월 전체 아카이브", countPrefix: " (", countSuffix: "개)", yearSuffix: "년", monthSuffix: "월" },
      admin: { title: "데이터 관리 모드", addBtn: "+ 데이터 추가", edit: "수정", delete: "삭제", save: "저장", cancel: "취소", addTitle: "새 데이터 추가", editTitle: "데이터 수정", mainType: "대분류", subType: "소분류", date: "날짜", contentTitle: "제목", imgUrl: "썸네일 URL", confirmDel: "정말 삭제하시겠습니까?" }
    };

    const state = {
      isLoading: true,
      sortOrder: 'desc',
      activeMainTab: 'archive', 
      activeSubTab: '전체 보기',
      activeCategory: '전체',
      selectedDate: todayStr,
      activeKeyword: '전체',
      viewYear: now.getFullYear(),
      viewMonth: now.getMonth() + 1,
      searchTerm: '',
      displayLimit: 30,
      isYearDropdownOpen: false, isMonthDropdownOpen: false,
      isAdminMode: false, isEditModalOpen: false, adminEditingId: null, adminTempMainType: '무대영상'
    };

    window.setMainTab = (tabId) => { state.activeMainTab = tabId; state.displayLimit = 30; render(); };
    window.setSubTab = (tab) => { state.activeSubTab = tab; state.activeCategory = '전체'; state.displayLimit = 30; render(); };
    window.setCategory = (cat) => { state.activeCategory = cat; state.displayLimit = 30; render(); };
    window.setSelectedDate = (date) => { state.selectedDate = date; render(); };
    window.setKeyword = (kw) => { state.activeKeyword = kw; state.displayLimit = 30; render(); };
    window.handleSearch = (e) => { state.searchTerm = e.target.value; state.displayLimit = 30; render(); };
    window.toggleSort = () => { state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc'; render(); };
    window.loadMore = () => { state.displayLimit += 30; render(); };

    window.toggleYearDropdown = (e) => { e.stopPropagation(); state.isYearDropdownOpen = !state.isYearDropdownOpen; render(); };
    window.toggleMonthDropdown = (e) => { e.stopPropagation(); state.isMonthDropdownOpen = !state.isMonthDropdownOpen; render(); };
    
    window.changeViewYear = (year) => { state.viewYear = parseInt(year); state.isYearDropdownOpen = false; render(); };
    window.changeViewMonth = (month) => { state.viewMonth = parseInt(month); state.isMonthDropdownOpen = false; render(); };
    window.prevMonth = () => { if (state.viewMonth === 1) { state.viewMonth = 12; state.viewYear--; } else { state.viewMonth--; } render(); };
    window.nextMonth = () => { if (state.viewMonth === 12) { state.viewMonth = 1; state.viewYear++; } else { state.viewMonth++; } render(); };

    window.toggleAdminMode = () => { state.isAdminMode = !state.isAdminMode; render(); };
    window.openAdminModal = (id = null) => {
      state.adminEditingId = id; state.isEditModalOpen = true;
      if(id) { const item = MOCK_ARCHIVE_DATA.find(d => d.id === id); if(item) state.adminTempMainType = item.mainType; } 
      else { state.adminTempMainType = '무대영상'; }
      render();
    };
    window.closeAdminModal = () => { state.isEditModalOpen = false; render(); };
    window.adminMainTypeChange = (val) => { state.adminTempMainType = val; render(); };
    
    window.deleteData = (id) => { if(confirm(textLabels.admin.confirmDel)) { MOCK_ARCHIVE_DATA = MOCK_ARCHIVE_DATA.filter(d => d.id !== id); render(); } };
    window.saveData = (e) => {
      e.preventDefault();
      const mainType = document.getElementById('form-mainType').value.trim();
      const type = document.getElementById('form-type').value.trim();
      const date = document.getElementById('form-date').value.trim();
      const title = document.getElementById('form-title').value.trim();
      const img = document.getElementById('form-img').value;
      const rawKeywords = document.getElementById('form-keywords')?.value.trim() || '';
      const cleanDate = date.replace(/-/g, '');
      const searchData = `${title} ${type} ${mainType} ${rawKeywords} ${date} ${cleanDate}`.toLowerCase();

      if(state.adminEditingId) {
        const idx = MOCK_ARCHIVE_DATA.findIndex(d => d.id === state.adminEditingId);
        if(idx > -1) MOCK_ARCHIVE_DATA[idx] = { ...MOCK_ARCHIVE_DATA[idx], mainType, type, date, title, img, searchData, rawKeywords };
      } else {
        MOCK_ARCHIVE_DATA.unshift({ id: Date.now(), mainType, type, date, title, img, link: '', searchData, rawKeywords });
      }
      state.isEditModalOpen = false; render();
    };

    document.addEventListener('click', () => {
      if (state.isYearDropdownOpen || state.isMonthDropdownOpen) {
        state.isYearDropdownOpen = false; state.isMonthDropdownOpen = false; render();
      }
    });

    async function loadSheetData() {
      try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();
        const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/);
        if(!jsonMatch) throw new Error("Format error");
        
        const data = JSON.parse(jsonMatch[1]);
        const rows = data.table.rows;

        MOCK_ARCHIVE_DATA = rows.map((row, index) => {
          if (!row.c) return null;
          const title = (row.c[0]?.v || '').toString().trim();
          let rawDate = (row.c[1]?.f || row.c[1]?.v || '').toString().trim();
          let dateStr = rawDate.replace(/[\.\s\/]/g, '-').replace(/-+/g, '-');
          if (dateStr && dateStr.includes('-')) {
            const parts = dateStr.split('-');
            if (parts.length === 3) {
              dateStr = `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
            }
          }
          const cleanDate = dateStr.replace(/-/g, ''); 
          const link = (row.c[2]?.v || '').toString().trim();
          const mainType = (row.c[8]?.v || '기타').toString().trim(); 
          const type = (row.c[10]?.v || '기타').toString().trim();   
          const img = (row.c[11]?.v || '').toString().trim();       
          const rawKeywords = (row.c[13]?.v || '').toString().trim(); 
          const searchKeywordsField = (row.c[3]?.v || '').toString().trim();
          const searchData = `${title} ${searchKeywordsField} ${rawKeywords} ${mainType} ${type} ${dateStr} ${cleanDate}`.toLowerCase();

          return { id: index + 1, mainType, type, date: dateStr, title, img, link, searchData, rawKeywords };
        }).filter(item => item && item.title); 

        state.isLoading = false;
        render();
      } catch (error) {
        console.error("Load failed", error);
        state.isLoading = false;
        render();
      }
    }

    function createCardHTML(item) {
      const imgUrl = item.img || 'https://via.placeholder.com/600x337/1a1a1a/ffffff?text=No+Image';
      const WrapperTag = item.link ? 'a' : 'div';
      const hrefAttr = item.link ? `href="${item.link}" target="_blank"` : '';

      return `
        <${WrapperTag} ${hrefAttr} class="flex flex-col gap-2 group cursor-pointer block">
          <div class="relative aspect-video rounded-xl overflow-hidden bg-neutral-800 border border-neutral-800 group-hover:border-neutral-600 transition-colors">
            <img src="${imgUrl}" alt="Thumb" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />
            ${item.link ? `<div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors flex items-center justify-center"><i data-lucide="external-link" class="w-6 h-6 text-white opacity-0 group-hover:opacity-100 transition-opacity"></i></div>` : ''}
          </div>
          <div class="flex flex-col gap-1 px-0.5">
            <div class="flex justify-between items-center text-[10px]">
              <span class="border border-red-500/50 text-red-500 bg-red-500/10 px-1.5 py-0.5 rounded font-medium">${item.type}</span>
              <span class="text-gray-500 font-medium tracking-tight">${item.date || ''}</span>
            </div>
            <h3 class="text-xs font-medium text-gray-200 line-clamp-2 leading-snug mt-1 group-hover:text-white transition-colors">${item.title}</h3>
          </div>
        </${WrapperTag}>
      `;
    }

    function getSearchFilteredData(dataArray) {
      if(!state.searchTerm) return dataArray;
      const lowerSearch = state.searchTerm.toLowerCase();
      return dataArray.filter(item => 
        item.title.toLowerCase().includes(lowerSearch) || 
        item.searchData.includes(lowerSearch)
      );
    }

    function getSortedData(dataArray) {
      return [...dataArray].sort((a, b) => {
        const dateA = a.date || "";
        const dateB = b.date || "";
        const dateComp = state.sortOrder === 'desc' ? dateB.localeCompare(dateA) : dateA.localeCompare(dateB);
        return dateComp || (state.sortOrder === 'desc' ? b.id - a.id : a.id - b.id);
      });
    }

    function render() {
      const searchInput = document.getElementById('search-input');
      if(searchInput) searchInput.placeholder = textLabels.searchPlaceholder;
      
      const adminBtn = document.getElementById('admin-toggle-btn');
      adminBtn.innerHTML = state.isAdminMode 
        ? `<i data-lucide="unlock" class="w-[18px] h-[18px] text-red-500"></i>` 
        : `<i data-lucide="lock" class="w-[18px] h-[18px] text-gray-400"></i>`;
      
      document.getElementById('search-container').style.display = state.isAdminMode ? 'none' : 'block';

      const mainTabsContainer = document.getElementById('main-tabs');
      const contentArea = document.getElementById('content-area');
      
      if (state.isLoading) {
        contentArea.innerHTML = `<div class="flex flex-col items-center justify-center mt-32"><i data-lucide="loader-2" class="w-8 h-8 text-red-500 animate-spin mb-4"></i></div>`;
        lucide.createIcons();
        return;
      }

      let contentHTML = '';

      if (state.isAdminMode) {
        mainTabsContainer.innerHTML = '';
        contentHTML = `
          <div class="animate-in fade-in duration-300">
            <div class="flex justify-between items-center mb-6 px-1">
              <h2 class="text-xl font-bold flex items-center gap-2"><i data-lucide="database" class="w-5 h-5 text-red-500"></i> ${textLabels.admin.title}</h2>
              <button onclick="openAdminModal()" class="bg-red-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold">${textLabels.admin.addBtn}</button>
            </div>
            <div class="flex flex-col gap-3">
              ${MOCK_ARCHIVE_DATA.map(item => `
                <div class="bg-[#1a1a1a] p-3 rounded-xl border border-neutral-800 flex gap-4">
                  <img src="${item.img || 'https://via.placeholder.com/80'}" class="w-16 h-16 rounded-lg object-cover">
                  <div class="flex-1 min-w-0">
                    <div class="text-[10px] text-red-400 mb-1">${item.mainType} > ${item.type} | ${item.date || 'No Date'}</div>
                    <div class="text-xs font-medium line-clamp-1 mb-2">${item.title}</div>
                    <div class="flex gap-2">
                      <button onclick="openAdminModal(${item.id})" class="text-[10px] bg-neutral-800 px-2 py-1 rounded">${textLabels.admin.edit}</button>
                      <button onclick="deleteData(${item.id})" class="text-[10px] bg-red-900/30 text-red-400 px-2 py-1 rounded">${textLabels.admin.delete}</button>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        if (state.isEditModalOpen) {
          const isEdit = state.adminEditingId !== null;
          const item = isEdit ? MOCK_ARCHIVE_DATA.find(d => d.id === state.adminEditingId) : { mainType: state.adminTempMainType, type: '', date: '', title: '', img: '', rawKeywords: '' };
          contentHTML += `
            <div class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
              <form onsubmit="saveData(event)" class="bg-[#1a1a1a] w-full max-sm rounded-2xl p-6 border border-neutral-700 flex flex-col gap-4">
                <h3 class="font-bold text-lg">${isEdit ? textLabels.admin.editTitle : textLabels.admin.addTitle}</h3>
                <div class="grid grid-cols-2 gap-3">
                  <input type="text" id="form-mainType" placeholder="대분류" value="${item.mainType}" class="bg-[#111] border border-neutral-700 rounded-lg p-2 text-xs">
                  <input type="text" id="form-type" placeholder="소분류" value="${item.type}" class="bg-[#111] border border-neutral-700 rounded-lg p-2 text-xs">
                </div>
                <input type="date" id="form-date" value="${item.date}" class="bg-[#111] border border-neutral-700 rounded-lg p-2 text-xs">
                <input type="text" id="form-title" placeholder="제목" value="${item.title}" required class="bg-[#111] border border-neutral-700 rounded-lg p-2 text-xs">
                <input type="text" id="form-keywords" placeholder="키워드 (N열)" value="${item.rawKeywords || ''}" class="bg-[#111] border border-neutral-700 rounded-lg p-2 text-xs">
                <input type="url" id="form-img" placeholder="썸네일 URL" value="${item.img}" class="bg-[#111] border border-neutral-700 rounded-lg p-2 text-xs">
                <div class="flex justify-end gap-2 mt-2">
                  <button type="button" onclick="closeAdminModal()" class="px-4 py-2 text-xs bg-neutral-800 rounded-lg">${textLabels.admin.cancel}</button>
                  <button type="submit" class="px-4 py-2 text-xs bg-red-600 rounded-lg font-bold">${textLabels.admin.save}</button>
                </div>
              </form>
            </div>
          `;
        }
      } else {
        const tabs = [{ id: 'archive', icon: '📁', label: textLabels.tabs.archive }, { id: 'keyword', icon: '💖', label: textLabels.tabs.keyword }, { id: 'calendar', icon: '📅', label: textLabels.tabs.calendar }];
        mainTabsContainer.innerHTML = tabs.map(tab => `<button onclick="setMainTab('${tab.id}')" class="flex items-center gap-1.5 px-4 py-3 text-sm font-bold border-b-2 transition-colors ${state.activeMainTab === tab.id ? 'border-red-600 text-white' : 'border-transparent text-gray-400'}"><span>${tab.icon}</span>${tab.label}</button>`).join('');

        if (state.activeMainTab === 'keyword') {
          let keywordData = MOCK_ARCHIVE_DATA.filter(item => {
            if (state.activeKeyword === '전체') {
              return item.rawKeywords && item.rawKeywords.trim() !== '';
            }
            return item.searchData.includes(state.activeKeyword.toLowerCase());
          });
          
          keywordData = getSortedData(getSearchFilteredData(keywordData));
          const visibleData = keywordData.slice(0, state.displayLimit);

          contentHTML = `
            <div class="bg-[#1a1a1a] rounded-2xl p-3 mb-6 border border-neutral-800">
              <div class="flex flex-wrap gap-1.5">
                ${['전체', ...KEYWORDS].map(kw => `<button onclick="setKeyword('${kw}')" class="px-2.5 py-1 rounded-full text-[11px] border ${state.activeKeyword === kw ? 'bg-red-600 border-red-600 text-white' : 'border-neutral-600 text-gray-400'}">${kw === '전체' ? textLabels.keyword.all : kw}</button>`).join('')}
              </div>
            </div>
            <div class="flex justify-between items-center mb-4 text-xs text-gray-400">
              <span>${textLabels.keyword.totalPrefix}${keywordData.length}${textLabels.keyword.totalSuffix}</span>
              <button onclick="toggleSort()" class="flex items-center gap-1"><i data-lucide="arrow-up-down" class="w-3 h-3"></i>${state.sortOrder === 'desc' ? textLabels.sortLatest : textLabels.sortOldest}</button>
            </div>
            <div class="grid grid-cols-2 gap-3">${visibleData.map(item => createCardHTML(item)).join('')}</div>
            ${keywordData.length > state.displayLimit ? `<button onclick="loadMore()" class="w-full mt-8 py-3 bg-[#1a1a1a] border border-neutral-800 rounded-xl text-xs font-bold text-gray-400 hover:text-white transition-colors">${textLabels.loadMore}</button>` : ''}
          `;
        } else if (state.activeMainTab === 'archive') {
          let archiveData = MOCK_ARCHIVE_DATA.filter(item => (state.activeSubTab === '전체 보기' || item.mainType === state.activeSubTab) && (state.activeCategory === '전체' || item.type === state.activeCategory));
          archiveData = getSortedData(getSearchFilteredData(archiveData));
          const visibleData = archiveData.slice(0, state.displayLimit);

          contentHTML = `
            <div class="flex gap-2 overflow-x-auto scrollbar-hide mb-4">
              ${MAIN_TABS_LIST.map(tab => `<button onclick="setSubTab('${tab}')" class="whitespace-nowrap px-3 py-1 rounded-full text-xs border ${state.activeSubTab === tab ? 'bg-neutral-800 border-neutral-600' : 'border-transparent text-gray-500'}">${tab}</button>`).join('')}
            </div>
            ${state.activeSubTab !== '전체 보기' ? `
              <div class="bg-[#1a1a1a] rounded-2xl p-3 mb-6 border border-neutral-800">
                <div class="flex flex-wrap gap-1.5">
                  <button onclick="setCategory('전체')" class="px-2.5 py-1 rounded-full text-[11px] border ${state.activeCategory === '전체' ? 'bg-red-600 border-red-600 text-white' : 'border-neutral-600 text-gray-400'}">${textLabels.archive.all}</button>
                  ${(CATEGORIES[state.activeSubTab] || []).map(cat => `<button onclick="setCategory('${cat}')" class="px-2.5 py-1 rounded-full text-[11px] border ${state.activeCategory === cat ? 'bg-red-600 border-red-600 text-white' : 'border-neutral-600 text-gray-400'}">${cat}</button>`).join('')}
                </div>
              </div>
            ` : ''}
            <div class="flex justify-between items-center mb-4 text-xs text-gray-400">
              <span>${textLabels.archive.totalPrefix}${archiveData.length}${textLabels.archive.totalSuffix}</span>
              <button onclick="toggleSort()" class="flex items-center gap-1"><i data-lucide="arrow-up-down" class="w-3 h-3"></i>${state.sortOrder === 'desc' ? textLabels.sortLatest : textLabels.sortOldest}</button>
            </div>
            <div class="grid grid-cols-2 gap-3">${visibleData.map(item => createCardHTML(item)).join('')}</div>
            ${archiveData.length > state.displayLimit ? `<button onclick="loadMore()" class="w-full mt-8 py-3 bg-[#1a1a1a] border border-neutral-800 rounded-xl text-xs font-bold text-gray-400 hover:text-white transition-colors">${textLabels.loadMore}</button>` : ''}
          `;
        } else if (state.activeMainTab === 'calendar') {
          const daysInMonth = new Date(state.viewYear, state.viewMonth, 0).getDate();
          const firstDay = new Date(state.viewYear, state.viewMonth - 1, 1).getDay();
          const monthKey = `${state.viewYear}-${String(state.viewMonth).padStart(2, '0')}`;
          const currentMonthData = MOCK_ARCHIVE_DATA.filter(item => item.date && item.date.startsWith(monthKey));
          const monthlyTotal = currentMonthData.length;
          const activeDays = currentMonthData.map(item => parseInt(item.date.split('-')[2]));
          
          let calGrid = '';
          for(let i=0; i<firstDay; i++) calGrid += `<div></div>`;
          for(let d=1; d<=daysInMonth; d++) {
            const dateStr = `${state.viewYear}-${String(state.viewMonth).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isSelected = state.selectedDate === dateStr;
            const isToday = todayStr === dateStr;
            calGrid += `<div onclick="setSelectedDate('${dateStr}')" class="flex flex-col items-center justify-center h-12 cursor-pointer group">
              <div class="w-8 h-8 flex items-center justify-center rounded-full text-sm font-bold ${isSelected ? 'bg-red-600 text-white' : isToday ? 'text-red-500 bg-neutral-800' : 'text-gray-300 group-hover:bg-neutral-800'}">${d}</div>
              ${activeDays.includes(d) ? `<div class="w-1 h-1 bg-red-500 rounded-full mt-0.5"></div>` : ''}
            </div>`;
          }

          let dailyData = getSortedData(getSearchFilteredData(currentMonthData));

          contentHTML = `
            <div class="flex items-center justify-between mb-6">
              <button onclick="prevMonth()"><i data-lucide="chevron-left"></i></button>
              <div class="flex gap-2">
                <span class="font-bold text-lg">${state.viewYear}${textLabels.calendar.yearSuffix} ${state.viewMonth}${textLabels.calendar.monthSuffix}</span>
              </div>
              <button onclick="nextMonth()"><i data-lucide="chevron-right"></i></button>
            </div>
            <div class="grid grid-cols-7 text-[10px] text-gray-500 font-bold mb-2 text-center">
              ${['SUN','MON','TUE','WED','THU','FRI','SAT'].map(day => `<div>${day}</div>`).join('')}
            </div>
            <div class="grid grid-cols-7 gap-y-1 mb-8">${calGrid}</div>
            <div class="border-t border-neutral-800 pt-6">
              <div class="flex items-center gap-2 mb-4 border-l-4 border-red-600 pl-3">
                <h3 class="font-bold text-gray-200">${state.viewMonth}${textLabels.calendar.archiveTitleSuffix}${textLabels.calendar.countPrefix}${monthlyTotal}${textLabels.calendar.countSuffix}</h3>
              </div>
              <div class="grid grid-cols-2 gap-3">${dailyData.length > 0 ? dailyData.map(item => createCardHTML(item)).join('') : `<div class="col-span-2 text-center text-gray-500 text-sm py-10">기록이 없습니다.</div>`}</div>
            </div>
          `;
        }
      }

      contentArea.innerHTML = contentHTML;
      lucide.createIcons();
    }

    loadSheetData();
  </script>
</body>
</html>
